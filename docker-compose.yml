version: "3.9"

services:
  # ============================================================
  # Database
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ios_platform_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_DATABASE:-ios_platform}
      MYSQL_USER: ${DB_USERNAME:-ios_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ios_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - ios_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Cache / Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ios_platform_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ios_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Backend (Laravel)
  # ============================================================
  backend:
    build:
      context: ./docker/backend
      dockerfile: Dockerfile
    container_name: ios_platform_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ios_platform}
      - DB_USERNAME=${DB_USERNAME:-ios_user}
      - DB_PASSWORD=${DB_PASSWORD:-ios_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET:-}
      - AWS_ENDPOINT=${AWS_ENDPOINT:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_TTL=${JWT_TTL:-60}
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
      - backend_logs:/var/www/html/storage/logs
    networks:
      - ios_network
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  # ============================================================
  # Queue worker
  # ============================================================
  queue:
    build:
      context: ./docker/backend
      dockerfile: Dockerfile
    container_name: ios_platform_queue
    restart: unless-stopped
    depends_on:
      - backend
      - redis
    working_dir: /var/www/html
    command: sh -c "php artisan queue:work --sleep=3 --tries=3 --max-time=3600"
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/var/www/html
    networks:
      - ios_network

  # ============================================================
  # Frontend (Next.js)
  # ============================================================
  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile
    container_name: ios_platform_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - API_INTERNAL_URL=http://backend:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ios_network
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: ios_platform_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - backend_storage:/var/www/storage:ro
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    networks:
      - ios_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_storage:
    driver: local
  backend_logs:
    driver: local

networks:
  ios_network:
    driver: bridge
